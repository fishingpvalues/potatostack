# Spotifyd — Spotify Connect daemon
# Docs: https://github.com/Spotifyd/spotifyd

[global]
username = "__SPOTIFY_USER__"
password = "__SPOTIFY_PASS__"
# Alternatively use keyring:
# use_keyring = true

backend  = "alsa"
device   = "__AUDIO_DEVICE__"    # hw:0,0=HDMI | hw:1,0=USB DAC
control  = "Master"
device_name = "__DEVICE_NAME__"
device_type = "speaker"

# Bitrate: 96 | 160 | 320 (Spotify max — always lossy OGG, but use highest)
bitrate = 320

# Volume normalization — disable for consistent volume
volume_normalisation = false
normalisation_pregain = 0

# Cache (reduces re-buffering)
cache_path = "/var/cache/spotifyd"
no_audio_cache = false

# Zeroconf port for Spotify Connect discovery
zeroconf_port = 5354

# Keep alive
autoplay = false
