# Backup Verification - Daily check that Velld and Backrest backups are fresh
name: backup-verify
schedule: "0 6 * * *"
maxActiveRuns: 1

steps:
  # Check Velld backups - count files modified in last 3 days
  - name: check-velld
    command: >-
      sh -c '
        COUNT=$(find /mnt/storage2/velld/backups -mtime -3 -type f 2>/dev/null | wc -l);
        echo "Velld backup files modified in last 3 days: ${COUNT}";
        [ "${COUNT}" -gt 0 ] || { echo "WARNING: No fresh Velld backups found"; exit 1; }
      '

  # Check pg_dumpall backup - must exist and be newer than 26h
  - name: check-postgres-dumpall
    command: >-
      sh -c '
        LATEST=$(find /mnt/storage2/backups/postgres -name "pgdumpall_*.sql.gz" -mtime -2 2>/dev/null | sort | tail -1);
        if [ -z "$LATEST" ]; then
          echo "ERROR: No pg_dumpall backup found in last 2 days";
          exit 1;
        fi;
        SIZE=$(du -sh "$LATEST" | cut -f1);
        echo "Latest pg_dumpall: $LATEST ($SIZE)";
        [ "$(stat -c%s "$LATEST")" -gt 1024 ] || { echo "ERROR: Backup too small (< 1KB), likely empty"; exit 1; }
      '

  # Check Backrest restic snapshots exist (uses restic CLI - no python3 in container)
  - name: check-backrest
    command: >-
      docker exec backrest sh -c '
        URI=$(grep -o "\"uri\": \"[^\"]*\"" /config/config.json | head -1 | sed "s/\"uri\": \"//;s/\"$//");
        PASS=$(grep -o "\"password\": \"[^\"]*\"" /config/config.json | head -1 | sed "s/\"password\": \"//;s/\"$//");
        COUNT=$(RESTIC_REPOSITORY="$URI" RESTIC_PASSWORD="$PASS" restic snapshots --compact 2>/dev/null | grep -c "^[0-9a-f]" || echo 0);
        echo "Backrest snapshots found: $COUNT";
        [ "$COUNT" -gt 0 ] || exit 1
      '

  # Check backup age - alert if last snapshot is older than ~26h (not today or yesterday)
  - name: check-backup-age
    command: >-
      docker exec backrest sh -c '
        URI=$(grep -o "\"uri\": \"[^\"]*\"" /config/config.json | head -1 | sed "s/\"uri\": \"//;s/\"$//");
        PASS=$(grep -o "\"password\": \"[^\"]*\"" /config/config.json | head -1 | sed "s/\"password\": \"//;s/\"$//");
        SNAP_DATE=$(RESTIC_REPOSITORY="$URI" RESTIC_PASSWORD="$PASS" restic snapshots --latest 1 --compact 2>/dev/null | grep -E "^[0-9a-f]{8}" | tail -1 | awk "{print \$2}");
        echo "Last snapshot date: $SNAP_DATE";
        TODAY=$(date +%Y-%m-%d);
        YESTERDAY=$(date -d @$(($(date +%s) - 86400)) +%Y-%m-%d);
        [ "$SNAP_DATE" = "$TODAY" ] || [ "$SNAP_DATE" = "$YESTERDAY" ] || { echo "Snapshot too old: $SNAP_DATE"; exit 1; }
      '
    depends:
      - check-backrest

handlerOn:
  failure:
    command: >-
      curl -s -X POST "${NTFY_INTERNAL_URL:-http://ntfy:80}/${NTFY_TOPIC_CRITICAL:-potatostack-critical}"
      -H "Title: Backup Verify FAILED"
      -H "Priority: urgent"
      -H "Tags: floppy_disk,x"
      -d "BACKUP ALERT: One or more backup systems have stale or missing data - investigate immediately"
