# Backup Verification - Daily check that Velld and Backrest backups are fresh
name: backup-verify
schedule: "0 6 * * *"
maxActiveRuns: 1

steps:
  # Check Velld backups - count files modified in last 24h
  - name: check-velld
    command: >-
      sh -c '
        COUNT=$(find /mnt/storage2/velld/backups -mtime -1 -type f 2>/dev/null | wc -l);
        echo "Velld backup files modified in last 24h: ${COUNT}";
        [ "${COUNT}" -gt 0 ] || { echo "WARNING: No fresh Velld backups found"; exit 1; }
      '

  # Check Backrest restic snapshots
  - name: check-backrest
    command: >-
      sh -c '
        COUNT=$(docker exec backrest restic snapshots --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d))" 2>/dev/null || echo 0);
        echo "Backrest snapshots found: ${COUNT}";
        [ "${COUNT}" -gt 0 ] || { echo "WARNING: No Backrest snapshots found"; exit 1; }
      '

  # Restic integrity check on backrest repos
  - name: restic-check
    command: >-
      docker exec backrest restic check 2>&1 | tail -5
    depends:
      - check-backrest

  # Check backup age - alert if last snapshot is older than 26 hours
  - name: check-backup-age
    command: >-
      sh -c '
        AGE=$(docker exec backrest restic snapshots --json 2>/dev/null | python3 -c "
        import sys, json
        from datetime import datetime, timezone
        snaps = json.load(sys.stdin)
        if not snaps: sys.exit(1)
        latest = max(snaps, key=lambda s: s[\"time\"])
        ts = datetime.fromisoformat(latest[\"time\"].replace(\"Z\",\"+00:00\"))
        age_h = (datetime.now(timezone.utc) - ts).total_seconds() / 3600
        print(f\"{age_h:.1f}\")
        " 2>/dev/null || echo "999");
        echo "Last snapshot age: ${AGE}h";
        awk "BEGIN{exit (${AGE}+0 > 26)}" || { echo "ERROR: Last backup is older than 26 hours"; exit 1; }
      '
    depends:
      - check-backrest

  # Notify results
  - name: notify-success
    command: >-
      curl -s -X POST "${NTFY_INTERNAL_URL:-http://ntfy:80}/${NTFY_TOPIC:-potatostack}"
      -H "Title: Backup Verify OK"
      -H "Priority: default"
      -H "Tags: floppy_disk,white_check_mark"
      -d "All backup systems verified: Velld fresh, Backrest snapshots intact and recent"
    depends:
      - check-velld
      - restic-check
      - check-backup-age

handlerOn:
  failure:
    command: >-
      curl -s -X POST "${NTFY_INTERNAL_URL:-http://ntfy:80}/${NTFY_TOPIC_CRITICAL:-potatostack-critical}"
      -H "Title: Backup Verify FAILED"
      -H "Priority: urgent"
      -H "Tags: floppy_disk,x"
      -d "BACKUP ALERT: One or more backup systems have stale or missing data - investigate immediately"
