// ShairPort-Sync configuration — AirPlay 2, lossless
// https://github.com/mikebrady/shairport-sync

general = {
  name = "__DEVICE_NAME__";              // Name shown in AirPlay device picker
  volume_range_db = 40;
  ignore_volume_control = "no";
  drift_tolerance_in_seconds = 0.002;   // tight sync for lossless
  resync_threshold_in_seconds = 0.05;
};

alsa = {
  output_device = "__AUDIO_DEVICE__";   // hw:0,0 for HDMI, hw:1,0 for USB DAC, spdif for optical
  mixer_control_name = "Master";
  mixer_device = "__AUDIO_DEVICE__";
  // Do NOT set output_format — let AirPlay 2 negotiate (24-bit/48kHz lossless ALAC)
};

// Use ALSA directly for bit-perfect output (comment out if using PipeWire)
// pa = {
//   sink = "alsa_output.pci-0000_00_1b.0.analog-stereo";
// };

sessioncontrol = {
  run_this_before_play_begins = "";
  run_this_after_play_ends = "";
  wait_for_completion = "no";
};

metadata = {
  enabled = "yes";
  include_cover_art = "yes";
  pipe_name = "/tmp/shairport-sync-metadata";
  pipe_timeout = 5000;
};

// Diagnostics — set to "warn" or "error" in production
diagnostics = {
  log_verbosity = 1;                    // 0=none, 1=err, 2=warn, 3=info, 4=debug
};
