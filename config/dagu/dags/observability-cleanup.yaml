# Observability Cleanup - Weekly Prometheus and Loki health check and maintenance
# Checks metrics stack health, disk usage, and cleans tombstones
name: observability-cleanup
schedule: "0 4 * * 6"
maxActiveRuns: 1

steps:
  # Check Prometheus health and disk usage
  - name: prometheus-health
    command: >-
      docker exec prometheus sh -c '
        echo "=== Prometheus ===";
        wget -qO- http://localhost:9090/-/healthy 2>/dev/null && echo " healthy" || echo " UNHEALTHY";
        echo "TSDB size:";
        du -sh /prometheus 2>/dev/null || echo "unknown";
        echo "Retention: $(cat /proc/1/cmdline 2>/dev/null | tr "\0" "\n" | grep retention || echo "default")";
      '

  # Clean Prometheus tombstones (frees space from deleted series)
  - name: prometheus-clean
    command: >-
      sh -c '
        RESP=$(curl -sf -X POST "http://prometheus:9090/api/v1/admin/tsdb/clean_tombstones" 2>&1);
        echo "Tombstone clean: ${RESP:-ok (no body = success)}";
        true
      '
    depends:
      - prometheus-health

  # Check Loki health via HTTP (loki is distroless - no shell available)
  - name: loki-health
    command: >-
      sh -c '
        echo "=== Loki ===";
        STATUS=$(curl -so /dev/null -w "%{http_code}" "http://loki:3100/ready" 2>/dev/null);
        echo "Loki /ready: HTTP $STATUS";
        [ "$STATUS" = "200" ] || { echo " UNHEALTHY (got $STATUS)"; exit 1; };
      '

  # Report scrape target health (how many exporters are up)
  - name: scrape-targets
    command: >-
      sh -c '
        TARGETS=$(curl -sf "http://prometheus:9090/api/v1/targets" 2>/dev/null | \
          python3 -c "
        import sys, json
        d = json.load(sys.stdin)
        active = d.get(\"data\",{}).get(\"activeTargets\",[])
        up = sum(1 for t in active if t.get(\"health\")==\"up\")
        down = [t.get(\"labels\",{}).get(\"job\",\"?\") for t in active if t.get(\"health\")==\"down\"]
        print(f\"Targets: {up}/{len(active)} up\")
        if down: print(f\"DOWN: {down}\")
          " 2>/dev/null || echo "could not query targets");
        echo "$TARGETS"
      '
    depends:
      - prometheus-health

handlerOn:
  failure:
    command: >-
      curl -s -X POST "${NTFY_INTERNAL_URL:-http://ntfy:80}/${NTFY_TOPIC_WARNING:-potatostack-warning}"
      -H "Title: Observability Cleanup Failed"
      -H "Priority: default"
      -H "Tags: chart_with_upwards_trend,warning"
      -d "Metrics stack maintenance failed - Prometheus or Loki may have issues"
