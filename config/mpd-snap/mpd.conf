# MPD — Homelab Snapcast feeder instance
# NO audio playback device — output is a FIFO pipe consumed by Snapcast server.
# Control with: mpc -h localhost -p 6601 (port 6601 to not clash with Le Potato MPD on 6600)
# Clients: NCMPCPP, Cantata, M.A.L.P., MPDroid — same as Le Potato MPD but separate instance

music_directory     "/music"
playlist_directory  "/var/lib/mpd/playlists"
db_file             "/var/lib/mpd/tag_cache"
log_file            "/var/log/mpd/mpd.log"
state_file          "/var/lib/mpd/state"
sticker_file        "/var/lib/mpd/sticker.sql"

bind_to_address     "0.0.0.0"
port                "6601"           # 6601 to avoid clash with Le Potato MPD on 6600

# ─── FIFO output — feeds Snapcast server ─────────────────────────────────────
# Format MUST match snapserver.conf sampleformat exactly.
audio_output {
  type        "fifo"
  name        "Snapcast pipe"
  path        "/tmp/snapcast/music.pipe"
  format      "48000:16:2"           # 48kHz, 16-bit, stereo
  mixer_type  "null"                 # no hardware mixer — volume controlled by snapcast clients
}

# ─── Buffer (large = survives NFS hiccups) ────────────────────────────────────
audio_buffer_size   "8192"
buffer_before_play  "5%"

# ─── ReplayGain ───────────────────────────────────────────────────────────────
replaygain          "album"
volume_normalization "no"

# ─── Auto-rescan ──────────────────────────────────────────────────────────────
auto_update         "yes"
auto_update_depth   "3"

log_level           "notice"
