# Log Fixes - Hourly application of post-start system fixes
# Replaces the systemd timer for apply-log-fixes.sh
name: log-fixes
schedule: "0 * * * *"
maxActiveRuns: 1

steps:
  - name: apply-fixes
    command: bash /scripts/setup/apply-log-fixes.sh

handlerOn:
  failure:
    command: >-
      curl -s -X POST "${NTFY_INTERNAL_URL:-http://ntfy:80}/${NTFY_TOPIC_WARNING:-potatostack-warning}"
      -H "Title: Log Fixes FAILED"
      -H "Priority: default"
      -H "Tags: wrench,x"
      -d "Hourly log-fixes script failed - check Dagu logs for details"
