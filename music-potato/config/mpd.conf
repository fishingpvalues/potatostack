# MPD — Music Player Daemon
# Reads music directly from NFS mount — bit-perfect, no transcoding

music_directory     "/mnt/music"
playlist_directory  "/var/lib/mpd/playlists"
db_file             "/var/lib/mpd/tag_cache"
log_file            "/var/log/mpd/mpd.log"
pid_file            "/run/mpd/pid"
state_file          "/var/lib/mpd/state"
sticker_file        "/var/lib/mpd/sticker.sql"

user  "mpd"
group "audio"

# Network
bind_to_address "0.0.0.0"  # Listen on all interfaces
port            "6600"

# ─── Lossless ALSA Output ────────────────────────────────────────────────────
audio_output {
  type          "alsa"
  name          "ALSA Direct (lossless)"
  device        "__AUDIO_DEVICE__"    # hw:0,0=HDMI | hw:1,0=USB DAC | spdif=optical
  format        "*:*:2"               # passthrough: any sample rate, any bit depth, stereo
  mixer_type    "hardware"
  mixer_device  "__AUDIO_DEVICE__"
  mixer_control "Master"

  # DSD support (uncomment if you have DSD files and a DSD-capable DAC)
  # dsd_usb "yes"
}

# ─── HTTP Stream Output ────────────────────────────────────────────────────────
# Play from any browser or VLC: http://music-potato:8000/stream
# Or over Tailscale: http://music-potato.tail-XXXX.ts.net:8000/stream
# This is a secondary output — both ALSA + HTTP play simultaneously.
audio_output {
  type        "httpd"
  name        "HTTP Stream"
  encoder     "flac"          # lossless over HTTP — change to "lame" for MP3 if clients need it
  port        "8000"
  max_clients "5"
  always_on   "yes"           # keep stream open even when nothing is playing (silence)
  tags        "yes"
  format      "44100:16:2"    # 44.1kHz 16-bit stereo (FLAC encoder compresses losslessly)
}

# ─── Snapcast pipe output ──────────────────────────────────────────────────────
# Feeds audio into Snapcast client for multi-room sync.
# Only active when snapcast-client profile is enabled.
# audio_output {
#   type    "fifo"
#   name    "Snapcast pipe"
#   path    "/tmp/snapcast.pipe"
#   format  "48000:16:2"
#   mixer_type "null"
# }

# ─── PipeWire Output (fallback for when ALSA device is busy) ─────────────────
audio_output {
  type   "pipewire"
  name   "PipeWire"
  enabled "no"       # Enable only if ALSA conflicts with shairport-sync
}

# ─── Buffer / Quality ─────────────────────────────────────────────────────────
# Large buffer prevents NFS stutter
audio_buffer_size   "8192"    # kB
buffer_before_play  "5%"

# Resampling (only used if source != output rate — disable for bit-perfect)
# samplerate_converter "soxr very high"

# ─── ReplayGain ──────────────────────────────────────────────────────────────
replaygain          "album"
replaygain_preamp   "0"
volume_normalization "no"     # Don't normalize — let the amp handle gain

# ─── Metadata ────────────────────────────────────────────────────────────────
metadata_to_use     "AlbumArtist,Artist,Album,Title,Track,Genre,Date"

# ─── Logging ─────────────────────────────────────────────────────────────────
log_level           "notice"

# ─── Auto-update library when NFS files change ────────────────────────────────
auto_update         "yes"
auto_update_depth   "3"
