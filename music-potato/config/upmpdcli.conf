# upmpdcli — UPnP/DLNA renderer fronting MPD
# Connects to MPD on localhost and exposes it as a DLNA renderer on the LAN
# Also bridges to Navidrome via Subsonic API for library browsing
# https://www.lesbonscomptes.com/upmpdcli/

# ─── UPnP Identity ────────────────────────────────────────────────────────────
friendlyname = music-potato
logfilename   = /var/log/upmpdcli.log
loglevel      = 2

# ─── MPD Connection ───────────────────────────────────────────────────────────
mpdhost = 127.0.0.1
mpdport = 6600

# ─── Subsonic / Navidrome Library ─────────────────────────────────────────────
# Uncomment to enable Navidrome browsing in DLNA controllers (BubbleUPnP etc.)
# subsonic = 1
# subsonicurl  = http://HOMELAB_IP:4533   # or Tailscale HTTPS URL
# subsonicuser = daniel
# subsonicpassword = changeme
# subsonicapipath = /rest

# ─── Audio format passthrough ─────────────────────────────────────────────────
# upmpdcli forwards the stream URI to MPD for lossless direct-play
# No transcoding happens here — lossless end-to-end
