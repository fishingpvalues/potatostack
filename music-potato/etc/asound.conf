# /etc/asound.conf — System-wide ALSA configuration
# Le Potato AML-S905X-CC

# ── Detect available cards ──────────────────────────────────────────────────
# Run: aplay -l
# Card 0 is usually HDMI (aml-augesound)
# Card 1+ is USB audio if plugged in
# SPDIF is accessible via: aplay -D spdif <file>

# ── Default output: HDMI (change to hw:1,0 for USB DAC) ───────────────────
defaults.pcm.card 0
defaults.pcm.device 0
defaults.ctl.card 0

# ── SPDIF optical output (enable ldto spdif first) ────────────────────────
pcm.spdif {
  type hw
  card 0
  device 1      # may differ — run: aplay -l | grep SPDIF
}

# ── Softvol (software volume control for hw devices that don't have it) ───
pcm.softvol {
  type softvol
  slave.pcm "hw:0,0"
  control {
    name "Master"
    card 0
  }
  min_dB -40.0
  max_dB   0.0
}

# ── dmix: allows multiple apps to share one ALSA device ───────────────────
# (Disable if using PipeWire — PipeWire handles mixing natively)
pcm.dmixed {
  type dmix
  ipc_key 1024
  slave {
    pcm  "hw:0,0"
    rate 48000          # Le Potato HDMI native rate
    format S32_LE
    period_size 1024
    buffer_size 8192
  }
}
