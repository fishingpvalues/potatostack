[server]
datadir = /var/lib/snapserver

[http]
enabled = true
port = 1780
doc_root = /usr/share/snapserver/snapweb

[tcp]
enabled = true
port = 1705

[stream]
# Source: MPD writes 48kHz/16-bit/stereo PCM into a named pipe.
# mpd-snap container and snapcast container share /tmp/snapcast volume.
# FLAC codec: lossless over LAN, ~50% bandwidth vs raw PCM.
source = pipe:///tmp/snapcast/music.pipe?name=music&sampleformat=48000:16:2&codec=flac

# Buffer: 1000ms keeps clients in sync even on WiFi.
# Increase to 1500ms if WiFi clients stutter.
buffer = 1000
codec = flac
sampleformat = 48000:16:2

[logging]
sink = system
filter = *:info
