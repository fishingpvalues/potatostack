# Beets Music Library - Nightly import and metadata enrichment
# Runs after TDL download (4am), imports from all sources then enriches metadata
name: beets-nightly
schedule: "0 4 * * *"
maxActiveRuns: 1

steps:
  # Phase 1: Parallel imports from all music sources
  - name: import-spotiflac
    command: docker exec -u abc beets beet import -q --move /downloads/spotiflac

  - name: import-slskd
    command: docker exec -u abc beets beet import -q /downloads/slskd

  - name: import-storage
    command: docker exec -u abc beets beet import -q /storage-downloads

  # Phase 2: MusicBrainz sync (depends on all imports)
  - name: mbsync
    command: docker exec -u abc beets beet mbsync
    depends:
      - import-spotiflac
      - import-slskd
      - import-storage

  # Phase 3: Parallel metadata enrichment (all depend on mbsync)
  - name: fetchart
    command: docker exec -u abc beets beet fetchart -q
    depends:
      - mbsync

  - name: lastgenre
    command: docker exec -u abc beets beet lastgenre
    depends:
      - mbsync

  - name: lyrics
    command: docker exec -u abc beets beet lyrics
    depends:
      - mbsync

  # Phase 4: ReplayGain (after metadata enrichment)
  - name: replaygain
    command: docker exec -u abc beets beet replaygain
    depends:
      - fetchart
      - lastgenre
      - lyrics

handlerOn:
  failure:
    command: >-
      curl -s -X POST "${NTFY_INTERNAL_URL:-http://ntfy:80}/${NTFY_TOPIC_CRITICAL:-potatostack-critical}"
      -H "Title: Beets Nightly FAILED"
      -H "Priority: high"
      -H "Tags: musical_note,x"
      -d "Beets nightly pipeline failed - check Dagu logs for details"
